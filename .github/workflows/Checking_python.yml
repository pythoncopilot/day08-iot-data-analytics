name: IoT Event-Based CI Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - "python/**"
      - "dashboard/**"
      - "arduino/**"
      - "database/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # -----------------------------
    # 1. Syntax check (full backend)
    # -----------------------------
    - name: Python syntax validation
      run: |
        python -m compileall python

    # -----------------------------
    # 2. Run analytics engine
    # -----------------------------
    - name: Run IoT analytics
      run: |
        python python/analytics.py

    # -----------------------------
    # 3. Basic structure validation
    # -----------------------------
    - name: Validate project structure
      run: |
        test -d python
        test -d dashboard
        test -d arduino
        test -d database