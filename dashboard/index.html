<!DOCTYPE html>
<html>
<head>
  <title>IoT Dashboard</title>
  <style>
    body { background:#0b1220; color:white; font-family:Arial; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:20px; }
    .card { background:#1e293b; padding:15px; border-radius:10px; }
    button { padding:5px; margin:3px; }
  </style>
</head>

<body>

<h2 style="text-align:center;">Smart Home Dashboard</h2>

<div class="grid">

  <div class="card">
    <h3>Light</h3>
    <button onclick="send('light',1)">ON</button>
    <button onclick="send('light',0)">OFF</button>
    <div id="light"></div>
  </div>

  <div class="card">
    <h3>Fan</h3>
    <input type="range" min="0" max="100" oninput="send('fan',this.value)">
    <div id="fan"></div>
  </div>

  <div class="card">
    <h3>AC</h3>
    <input type="range" min="18" max="30" oninput="send('ac',this.value)">
    <div id="ac"></div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
